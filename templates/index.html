<!DOCTYPE html>
<html>
<head>
	<title>Dashboard Simulator</title>
<style>
	body{
		background-color: black
    }
	
	.contenedor {
		display: flex;
		justify-content: center;
		gap: 20px;
    }
    
    .boton-contenedor {
		display: flex;
		justify-content: center;
		gap: 20px;
		margin-top: 20px;
	}
    
    .tarjeta{
		width:250px;
		background-color:#eeeeee;
		border-radius:10px;
		padding:15px;
		text-align:center;
	}

	.valor{
		font-size:30px;
	}
	
	.boton{
		background-color:green;
		color:white;
		padding:20px;
		border:none;
		border-radius:5px;
		cursor: pointer;
	}

</style>
</head>
<script>
async function actualizarDatos() {
    try {
        const response = await fetch('/datos');
        const data = await response.json();

        document.getElementById('sensorX').textContent = data.ejeX;
        document.getElementById('sensorY').textContent = data.ejeY;
    } catch (error) {
        console.error('Error actualizando datos:', error);
    }
}

setInterval(actualizarDatos, 20);
</script>
<body>
<div class="contenedor">
	<div class="tarjeta">
		<h2>Sensor X</h2>
		<p class="valor" id="sensorX">
			{{ ejeX }}
		</p>
	</div>
	<div class="tarjeta">
		<h2>Sensor Y</h2>
		<p class="valor" id="sensorY">
			{{ ejeY }}
		</p>
	</div>
</div>
</body>
</html>
